apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: meeting-ai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: YOUR_REGISTRY/meeting-ai-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: meeting-ai-config
            - secretRef:
                name: meeting-ai-secret
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: meeting-ai
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
