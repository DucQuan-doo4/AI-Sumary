apiVersion: v1
kind: ConfigMap
metadata:
  name: meeting-ai-config
  namespace: meeting-ai
data:
  APP_NAME: "AI Meeting Action Tracking System"
  ENVIRONMENT: "production"
  JWT_ALGORITHM: "HS256"
  ACCESS_TOKEN_EXPIRE_MINUTES: "60"
  BACKEND_CORS_ORIGINS: "http://YOUR_DOMAIN_OR_LOAD_BALANCER"
  DEFAULT_ADMIN_EMAIL: "admin@example.com"
  DEFAULT_ADMIN_FULL_NAME: "System Admin"
  AI_PROVIDER: "vertexai"
  USE_MOCK_AI: "true"
  GCP_PROJECT_ID: "lyrical-link-498907-a2"
  GCP_LOCATION: "us-central1"
  GEMINI_MODEL: "gemini-2.5-flash"
  VITE_API_URL: "/api"
