apiVersion: batch/v1
kind: Job
metadata:
  name: backend-migrate
  namespace: meeting-ai
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: YOUR_REGISTRY/meeting-ai-backend:latest
          imagePullPolicy: Always
          command: ["alembic", "upgrade", "head"]
          envFrom:
            - configMapRef:
                name: meeting-ai-config
            - secretRef:
                name: meeting-ai-secret
